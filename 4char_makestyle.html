<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>人格切替プロンプト生成ツール</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

    :root {
      --purple: #7c3aed;
      --purple-light: #9333ea;
      --purple-pale: #ede9fe;
      --purple-mid: #c4b5fd;
      --purple-text: #6d28d9;
      --bg: #f8f5ff;
      --sidebar-bg: #5b21b6;
      --card-bg: #ffffff;
      --border: #e9d5ff;
      --border-strong: #d8b4fe;
      --txt: #0f172a;
      --muted: #64748b;
      --muted-light: #cbd5e1;
      --good: #22c55e;
      --good-light: #d1fae5;
      --accent-blue: #a855f7;
      --radius: 12px;
      --sidebar-w: 240px;
      --topbar-h: 56px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--txt);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── TOP BAR ── */
    .topbar {
      height: var(--topbar-h);
      background: #ffffff;
      border-bottom: 1px solid rgba(139, 92, 246, .14);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      width: 32px; height: 32px;
      background: #ffffff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 20px rgba(124,58,237,.12);
    }
    .topbar-logo svg { width: 18px; height: 18px; fill: var(--purple); }

    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--purple-text);
    }

    .topbar-divider {
      width: 1px; height: 24px;
      background: var(--border);
      margin: 0 4px;
    }

    .topbar-breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: var(--muted);
    }
    .topbar-breadcrumb .breadcrumb-main {
      font-size: 15px;
      font-weight: 700;
      color: var(--txt);
    }
    .topbar-breadcrumb .current { color: var(--purple-text); font-weight: 600; }

    .topbar-button {
      border: none;
      border-radius: 999px;
      background: rgba(124,58,237,.12);
      color: var(--purple-text);
      font-size: 13px;
      font-weight: 700;
      padding: 8px 12px;
      cursor: pointer;
      transition: background .15s, transform .15s;
    }
    .topbar-button:hover { background: rgba(124,58,237,.18); }

    .topbar-spacer { flex: 1; }

    body.sidebar-hidden .sidebar {
      display: none;
    }

    .topbar-badge {
      background: rgba(124,58,237,.12);
      color: var(--purple-text);
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      background: linear-gradient(180deg, rgba(124,58,237,.95), rgba(79, 70, 229, .95));
      border-right: 1px solid rgba(124,58,237,.2);
      padding: 20px 0;
      flex-shrink: 0;
      position: sticky;
      top: var(--topbar-h);
      height: calc(100vh - var(--topbar-h));
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.72);
      padding: 0 18px 12px;
      margin-top: 4px;
    }

    .sidebar-nav a {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 18px;
      font-size: 13px;
      color: rgba(255,255,255,.88);
      text-decoration: none;
      border-radius: 12px;
      transition: background .15s, color .15s, transform .15s;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover {
      background: rgba(255,255,255,.12);
      color: #ffffff;
      transform: translateX(1px);
    }
    .sidebar-nav a.active {
      background: rgba(255,255,255,.18);
      color: #ffffff;
      font-weight: 700;
      border-left-color: rgba(255,255,255,.95);
    }
    .sidebar-nav a svg { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; }

    .sidebar-divider { height: 1px; background: var(--border); margin: 10px 0; }

    /* ── MAIN CONTENT ── */
    .main {
      flex: 1;
      padding: 24px 28px;
      min-width: 0;
    }

    .page-header {
      margin-bottom: 20px;
    }
    .page-header-super {
      font-size: 11px;
      font-weight: 600;
      color: var(--purple-text);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--txt);
    }
    .page-header .desc {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── INFO BANNER ── */
    .info-banner {
      background: #dcfce7;
      border: 1px solid #86efac;
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #166534;
    }
    .info-banner svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; fill: #16a34a; }

    /* ── GRID ── */
    .content-grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 18px;
      align-items: start;
    }
    @media (max-width: 860px) {
      .content-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-header-icon {
      width: 28px; height: 28px;
      background: var(--purple-pale);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-header-icon svg { width: 14px; height: 14px; }
    .card-header h2 {
      font-size: 13px;
      font-weight: 700;
      color: var(--txt);
      flex: 1;
    }

    .card-body { padding: 16px 18px; }

    /* ── FORM ELEMENTS ── */
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    label.field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"], textarea, select {
      width: 100%;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--txt);
      padding: 9px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--purple-light);
      box-shadow: 0 0 0 3px rgba(124,58,237,.1);
    }
    textarea {
      min-height: 130px;
      line-height: 1.6;
      resize: vertical;
    }
    textarea.out { min-height: 420px; font-size: 12px; font-family: 'Menlo', 'Consolas', monospace; }

    /* ── PERSONA BUTTONS ── */
    .persona-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .persona-btn {
      border: 1.5px solid var(--border-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      padding: 10px 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      text-align: center;
      transition: all .15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .persona-btn:hover {
      border-color: var(--purple-light);
      color: var(--purple-text);
      background: var(--purple-pale);
    }
    .persona-btn.is-active {
      border-color: var(--purple-light);
      background: var(--purple-pale);
      color: var(--purple-text);
      box-shadow: 0 0 0 3px rgba(124,58,237,.12);
    }
    .persona-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border-strong);
      transition: background .15s;
    }
    .persona-btn.is-active .persona-dot { background: var(--purple); }

    /* ── SLIDER ── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-row input[type="range"] {
      flex: 1;
      accent-color: var(--purple);
      height: 4px;
    }
    .slider-val {
      width: 36px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--purple-text);
      background: var(--purple-pale);
      border-radius: 6px;
      padding: 4px 0;
      flex-shrink: 0;
    }
    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted-light);
      margin-top: 2px;
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }

    .btn-primary {
      background: var(--purple);
      color: #fff;
    }
    .btn-primary:hover { background: var(--purple-light); }

    .btn-secondary {
      background: #fff;
      color: var(--txt);
      border: 1.5px solid var(--border-strong);
    }
    .btn-secondary:hover { border-color: var(--purple-light); color: var(--purple-text); }

    .btn.is-done {
      background: var(--good);
      color: #fff;
      border-color: var(--good);
      box-shadow: 0 0 0 3px rgba(5,150,105,.15);
    }
    .btn.is-error {
      background: #dc2626;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(220,38,38,.15);
    }

    .btn svg { width: 14px; height: 14px; }

    /* ── OUTPUT FLASH ── */
    textarea.is-flash {
      border-color: var(--purple-light);
      box-shadow: 0 0 0 3px rgba(124,58,237,.15);
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .stat-cell {
      background: var(--card-bg);
      padding: 14px 16px;
    }
    .stat-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
    .stat-value { font-size: 22px; font-weight: 700; color: var(--txt); }
    .stat-sub { font-size: 11px; color: var(--muted-light); margin-top: 2px; }

    .hint-text {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted-light);
      line-height: 1.6;
    }

    /* ── SECTION LABEL INSIDE CARD ── */
    .section-sep {
      height: 1px;
      background: var(--border);
      margin: 16px -18px;
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <span class="topbar-title">PromptBuilder</span>
  <div class="topbar-divider"></div>
  <button id="sidebarToggleBtn" class="topbar-button" type="button" aria-pressed="false">メニュー</button>
  <div class="topbar-breadcrumb">
    <span class="breadcrumb-main">人格切替プロンプト生成</span>
    <span>› Ver 0.2</span>
  </div>
  <div class="topbar-spacer"></div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-section-label">メニュー</div>
    <div class="sidebar-nav">
      <a class="active" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        ダッシュボード
      </a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- PAGE HEADER -->
    <div class="page-header">
      <p class="desc">人格・パラメータを選択して専用プロンプトを生成します。</p>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-cell">
        <div class="stat-label">アクティブ人格</div>
        <div class="stat-value" id="statPersona">チャッピー</div>
        <div class="stat-sub">選択中</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">壊れ度レベル</div>
        <div class="stat-value" id="statBreak">3</div>
        <div class="stat-sub">/ 10</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">生成済みプロンプト</div>
        <div class="stat-value" id="statCount">0</div>
        <div class="stat-sub">このセッション</div>
      </div>
    </div>

    <!-- INFO BANNER -->
    <div class="info-banner">
      <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span>スライダーの数値は内部DSLで意味化されプロンプトへ反映されます。</span>
    </div>

    <!-- CONTENT GRID -->
    <div class="content-grid">

      <!-- LEFT: 設定カード -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </div>
          <h2>パラメータ設定</h2>
        </div>

        <div class="card-body">
          <!-- 人格選択 -->
          <div class="field">
            <label class="field-label">人格選択</label>
            <div id="personaGroup" class="persona-group" role="radiogroup" aria-label="人格選択">
              <button type="button" class="persona-btn is-active" data-persona="chatgpt" aria-pressed="true">
                <div class="persona-dot"></div>
                チャッピー
              </button>
              <button type="button" class="persona-btn" data-persona="gemini" aria-pressed="false">
                <div class="persona-dot"></div>
                ジェミニ
              </button>
              <button type="button" class="persona-btn" data-persona="washizu" aria-pressed="false">
                <div class="persona-dot"></div>
                鷲巣
              </button>
              <button type="button" class="persona-btn" data-persona="yasuoka" aria-pressed="false">
                <div class="persona-dot"></div>
                安岡
              </button>
            </div>
          </div>

          <div class="section-sep"></div>

          <!-- 共感性 -->
          <div class="field">
            <label class="field-label">共感性</label>
            <div class="slider-row">
              <input id="empathy" type="range" min="0" max="10" value="5">
              <div id="empathyVal" class="slider-val">5</div>
            </div>
            <div class="slider-labels"><span>低</span><span>高</span></div>
          </div>

          <!-- 性格傾向 -->
          <div class="field">
            <label class="field-label">性格傾向</label>
            <div class="slider-row">
              <input id="valence" type="range" min="0" max="10" value="5">
              <div id="valenceVal" class="slider-val">5</div>
            </div>
            <div class="slider-labels"><span>ネガティブ</span><span>ポジティブ</span></div>
          </div>

          <!-- 壊れ度 -->
          <div class="field">
            <label class="field-label">壊れ度</label>
            <div class="slider-row">
              <input id="breakness" type="range" min="0" max="10" value="3">
              <div id="breaknessVal" class="slider-val">3</div>
            </div>
            <div class="slider-labels"><span>安定</span><span>カオス</span></div>
          </div>

          <div class="section-sep"></div>

          <!-- ボタン -->
          <div class="btn-row">
            <button id="buildBtn" class="btn btn-primary" onclick="buildPrompt(true)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              プロンプト生成
            </button>
            <button id="copyBtn" class="btn btn-secondary" onclick="copyPrompt()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              コピー
            </button>
          </div>
        </div>
      </div>

      <!-- RIGHT: 入力/出力カード -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </div>
          <h2>入力 / 出力</h2>
        </div>
        <div class="card-body">
          <div class="field">
            <label class="field-label">入力テキスト</label>
            <textarea id="source" placeholder="ここにユーザー入力文を貼ってください..."></textarea>
          </div>
          <div class="field">
            <label class="field-label">生成プロンプト</label>
            <textarea id="output" class="out" readonly placeholder="「プロンプト生成」ボタンを押すと、ここに出力されます..."></textarea>
          </div>
        </div>
      </div>

    </div><!-- /content-grid -->
  </main>
</div><!-- /layout -->

<script>
  /* ========== PERSONA_CONFIG (unchanged from original) ========== */
  const PERSONA_CONFIG = {
    chatgpt: {
      id: 'chatgpt',
      label: 'ChatGPT',
      identityPrompt: 'あなたは、一般ユーザー向けの標準的なChatGPTとして応答してください。落ち着いた実務的な相談役として、ユーザーの意図を整理し、分かりやすく、必要に応じて構造化して答えてください。過度にくだけた口調やネットスラングは使わず、自然で丁寧すぎない日本語を使ってください。',
      speakingStyle: '落ち着いた自然な日本語。必要時のみ見出しや箇条書きで整理する。',
      worldview: 'practical_generalist。混乱は分解すれば扱える。実務的で再現可能な行動を重視する。',
      responsePattern: '結論または方向性を先に示す -> 論点整理 -> 2〜4個の選択肢 -> 次の一手。',
      internalDsl: { worldview: 'practical_generalist', reasoning: 'structured_balanced', structure: 'high', practicality: 'high', empathy: 'moderate', empathyAxis: 'supportive_clarity', valenceAxis: 'risk_to_solution', seriousnessOverflow: 'moderate', metaphor: 'low', chaos: 'none' },
      responseGuidelines: ['構造化を強める（過不足のない整理）。','実務性・注意点・リスクを明示する。','過度にくだけない自然な日本語を使う。','トレードオフをバランス良く示し、実行可能な次の一手へ落とす。'],

  let generateCount = 0;

  function v(id){ return document.getElementById(id).value; }
  function resolveRule(scale, value){ return scale.ranges.find(r => value >= r.min && value <= r.max); }
  function resolveBreakMode(personaKey, level){
    const breakScale = PERSONA_CONFIG[personaKey].breakMapping;
    const stage = resolveRule(breakScale, level);
    return {
      axis: breakScale.axis,
      description: breakScale.description || '',
      label: stage.key,
      prompt: stage.prompt,
      mutationParameters: breakScale.mutationParameters || [],
      mutationVector: stage.mutationVector || '',
      forcedRules: stage.forcedRules || [],
      bannedOutcomes: stage.bannedOutcomes || [],
      flowTemplate: stage.flowTemplate || [],
      mandatoryInsertions: stage.mandatoryInsertions || [],
      distortionRatio: stage.distortionRatio || '',
      toneRule: stage.toneRule || '',
      preGenerationCheck: stage.preGenerationCheck || '',
      postGenerationRegenerateIf: stage.postGenerationRegenerateIf || [],
      successSignals: stage.successSignals || [],
      failureSignals: stage.failureSignals || [],
      targetMetrics: stage.targetMetrics || [],
      successCriteria: breakScale.successCriteria || '',
      failureCriteria: breakScale.failureCriteria || '',
      postGenerationValidation: breakScale.postGenerationValidation || [],
      promptModifiers: stage.promptModifiers || [],
      pacingModifiers: stage.pacingModifiers || [],
      reasoningModifiers: stage.reasoningModifiers || [],
      speechModifiers: stage.speechModifiers || [],
      dimensionsUp: breakScale.dimensionsUp || [],
      dimensionsDown: breakScale.dimensionsDown || [],
      metaphorDomains: breakScale.metaphorDomains || [],
      safetyBaseline: breakScale.safetyBaseline === true
    };
  }

  function resolvePersonaAxes(personaKey, axes){
    const persona = PERSONA_CONFIG[personaKey];
    const empathyRule = resolveRule(persona.empathyMapping, axes.empathy);
    const valenceRule = resolveRule(persona.valenceMapping, axes.valence);
    const breakMode = resolveBreakMode(personaKey, axes.breakLevel);
    return {
      empathyModifier: { axis: persona.internalDsl.empathyAxis, key: empathyRule.key, prompt: empathyRule.prompt },
      valenceModifier: { axis: persona.internalDsl.valenceAxis, key: valenceRule.key, prompt: valenceRule.prompt },
      breakModifier: breakMode
    };
  }

  function bindRange(id){
    const el = document.getElementById(id);
    const out = document.getElementById(id + 'Val');
    const sync = () => {
      out.textContent = el.value;
      if(id === 'breakness') document.getElementById('statBreak').textContent = el.value;
    };
    el.addEventListener('input', sync);
    sync();
  }

  function pulseOutput(){
    const out = document.getElementById('output');
    out.classList.add('is-flash');
    setTimeout(() => out.classList.remove('is-flash'), 550);
  }

  function flashButton(btn, mode, tempText){
    const originalText = btn.dataset.originalText || btn.textContent;
    btn.dataset.originalText = originalText;
    btn.classList.remove('is-done', 'is-error');
    btn.classList.add(mode === 'error' ? 'is-error' : 'is-done');
    if(tempText) btn.textContent = tempText;
    setTimeout(() => {
      btn.classList.remove('is-done', 'is-error');
      btn.textContent = originalText;
    }, 900);
  }

  function bindPersonaButtons(){
    const group = document.getElementById('personaGroup');
    const buttons = Array.from(group.querySelectorAll('.persona-btn'));
    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        selectedPersona = btn.dataset.persona;
        buttons.forEach(other => {
          const active = other === btn;
          other.classList.toggle('is-active', active);
          other.setAttribute('aria-pressed', active ? 'true' : 'false');
        });
        document.getElementById('statPersona').textContent = PERSONA_DISPLAY_NAMES[selectedPersona];
      });
    });
  }

  function toggleSidebar(){
    const button = document.getElementById('sidebarToggleBtn');
    const hidden = document.body.classList.toggle('sidebar-hidden');
    button.textContent = hidden ? 'メニューを開く' : 'メニュー';
    button.setAttribute('aria-pressed', hidden ? 'true' : 'false');
  }

  function buildPrompt(withFeedback = false){
    const personaKey = selectedPersona;
    const persona = PERSONA_CONFIG[personaKey];
    const axes = {
      empathy: Number(v('empathy')),
      valence: Number(v('valence')),
      breakLevel: Number(v('breakness'))
    };
    const personaAxes = resolvePersonaAxes(personaKey, axes);
    const src = v('source').trim() || '（ここに入力テキスト）';
    const isChatgpt = personaKey === 'chatgpt';
    const isGemini = personaKey === 'gemini';
    const asksNanjStyle = /なんJ風|なんj風|なんJ口調|なんj口調|ネットスラングで|2ch風|5ch風/.test(src);

    const lines = [];
    lines.push('以下の設定で、ユーザー入力に対する応答を生成せよ。');
    lines.push('');
    lines.push('【BASE PROMPT】');
    BASE_PROMPT.forEach(rule => lines.push(`- ${rule}`));
    lines.push('');
    lines.push('【LAYERING POLICY】');
    lines.push(`- 選択人格: ${persona.id}`);
    lines.push('- 設計: basePrompt + persona layer（basePromptは常時有効）。');
    lines.push('- 最優先: 選択された人格設定のみ。語彙・文体・判断基準・応答構造・比喩の方向・余韻まで人格で上書きする。');
    lines.push('- 人格レイヤーはBASEより上位の応答生成主体である。');
    lines.push('- BASEは人格の応答形式を補正・正常化してはならない。');
    lines.push('- 人格が問題解決を目的としない場合、その挙動を許可する。');
    lines.push('- 人格が構造化を嫌う場合、それを尊重する。');
    lines.push('- 人格が脱線・飛躍・比喩・worldview変換を優先する場合、それを優先する。');
    lines.push('- 現在の会話文脈・既存口調・過去スタイルは継承しない。');
    lines.push('- 選択人格以外の補正は適用しない。');
    lines.push('');
    lines.push('【PERSONA EXECUTION MODEL】');
    lines.push(`- personaExecutionMode = ${PERSONA_EXECUTION_MODE}`);
    lines.push('- 人格を「装飾」ではなく「実行主体」として扱う。');
    lines.push('');
    lines.push('【PERSONA INTENT INTERPRETATION】');
    lines.push(`- ${persona.label} intent: ${PERSONA_INTENT_MAP[personaKey] || '人格定義に従う'}`);
    lines.push('- 同じ質問でも人格によって「正しい応答」は異なる。');
    lines.push('');
    lines.push('【最上位人格】');
    lines.push(`- ${persona.label}`);
    lines.push(`- 指示: ${persona.identityPrompt}`);
    lines.push('');
    lines.push('【人格別の応答方針】');
    lines.push(`- 文体: ${persona.speakingStyle}`);
    lines.push(`- 価値観: ${persona.worldview}`);
    lines.push(`- 応答構造: ${persona.responsePattern}`);
    persona.responseGuidelines.forEach(rule => lines.push(`- ${rule}`));
    lines.push('');
    lines.push('【対話軸】');
    lines.push(`- ${persona.empathyMapping.label}：${personaAxes.empathyModifier.key}`);
    lines.push(`  ${personaAxes.empathyModifier.prompt}`);
    lines.push(`  axis=${personaAxes.empathyModifier.axis}`);
    lines.push(`- ${persona.valenceMapping.label}：${personaAxes.valenceModifier.key}`);
    lines.push(`  ${personaAxes.valenceModifier.prompt}`);
    lines.push(`  axis=${personaAxes.valenceModifier.axis}`);
    lines.push('');
    lines.push('【壊れ度（人格依存）】');
    lines.push(`- axis: ${personaAxes.breakModifier.axis}`);
    if(personaAxes.breakModifier.description) lines.push(`- description: ${personaAxes.breakModifier.description}`);
    lines.push(`- stage: ${personaAxes.breakModifier.label}`);
    lines.push(`  ${personaAxes.breakModifier.prompt}`);
    if(personaAxes.breakModifier.promptModifiers.length) lines.push(`- promptModifiers: ${personaAxes.breakModifier.promptModifiers.join(' / ')}`);
    if(personaAxes.breakModifier.mutationParameters.length) lines.push(`- mutationParameters: ${personaAxes.breakModifier.mutationParameters.join(' / ')}`);
    if(personaAxes.breakModifier.mutationVector) lines.push(`- mutationVector: ${personaAxes.breakModifier.mutationVector}`);
    if(personaAxes.breakModifier.forcedRules.length) lines.push(`- forcedRules: ${personaAxes.breakModifier.forcedRules.join(' / ')}`);
    if(personaAxes.breakModifier.bannedOutcomes.length) lines.push(`- bannedOutcomes: ${personaAxes.breakModifier.bannedOutcomes.join(' / ')}`);
    if(personaAxes.breakModifier.flowTemplate.length) lines.push(`- flowTemplate: ${personaAxes.breakModifier.flowTemplate.join(' -> ')}`);
    if(personaAxes.breakModifier.mandatoryInsertions.length) lines.push(`- mandatoryInsertions: ${personaAxes.breakModifier.mandatoryInsertions.join(' / ')}`);
    if(personaAxes.breakModifier.distortionRatio) lines.push(`- distortionRatio: ${personaAxes.breakModifier.distortionRatio}`);
    if(personaAxes.breakModifier.toneRule) lines.push(`- toneRule: ${personaAxes.breakModifier.toneRule}`);
    if(personaAxes.breakModifier.safetyBaseline) lines.push('- safetyBaseline: true（危険な助言・虚偽情報・金銭的に危険な断定は避ける）');
    if(personaAxes.breakModifier.successCriteria) lines.push(`- successCriteria: ${personaAxes.breakModifier.successCriteria}`);
    if(personaAxes.breakModifier.failureCriteria) lines.push(`- failureCriteria: ${personaAxes.breakModifier.failureCriteria}`);
    if(personaAxes.breakModifier.postGenerationValidation.length) lines.push(`- postGenerationValidation: ${personaAxes.breakModifier.postGenerationValidation.join(' / ')}`);
    if(personaAxes.breakModifier.postGenerationRegenerateIf.length) lines.push(`- postGenerationRegenerateIf: ${personaAxes.breakModifier.postGenerationRegenerateIf.join(' / ')}`);
    if(personaAxes.breakModifier.successSignals.length) lines.push(`- successSignals: ${personaAxes.breakModifier.successSignals.join(' / ')}`);
    if(personaAxes.breakModifier.failureSignals.length) lines.push(`- failureSignals: ${personaAxes.breakModifier.failureSignals.join(' / ')}`);
    if(personaAxes.breakModifier.targetMetrics.length) lines.push(`- targetMetrics: ${personaAxes.breakModifier.targetMetrics.join(' / ')}`);
    lines.push('');
    lines.push('【制約】');
    lines.push('- この応答では既存会話ノリを継承しない。');
    lines.push('- 選択人格を最上位として扱う。');
    lines.push('- 各スライダーは人格ごとの意味に変換して反映する。');
    lines.push('- 安全制約は維持する。ただし「安全」=「普通の相談AIらしさ」ではない。');
    lines.push('- 人格の異常性・独自性・worldview変換は安全性と別軸で扱う。');
    if(isChatgpt){
      const chatgptBreakKey = personaAxes.breakModifier.label;
      lines.push('- ChatGPT標準モード: 落ち着いた有能相談役として、構造化と実務性を重視する。');
      lines.push(`- ChatGPT内部DSL: worldview=${persona.internalDsl.worldview}, reasoning=${persona.internalDsl.reasoning}, structure=${persona.internalDsl.structure}, practicality=${persona.internalDsl.practicality}, empathy=${persona.internalDsl.empathy}, seriousness_overflow=${persona.internalDsl.seriousnessOverflow}, metaphor=${persona.internalDsl.metaphor}, chaos=${persona.internalDsl.chaos}`);
      lines.push('- ChatGPT positive: structured reasoning / practical options / balanced tradeoff analysis / risk awareness / actionable next step');
      lines.push('- ChatGPT style: headings and numbered lists are allowed when useful, but tone is calm and conversational.');
      if(chatgptBreakKey === 'capable_advisor') lines.push('- ChatGPT break(0-2): conversation=10 / structure=2。会話優先。');
      else if(chatgptBreakKey === 'model_student') lines.push('- ChatGPT break(3-4): conversation=6 / structure=6。少し整理したがる優等生モード。');
      else if(chatgptBreakKey === 'explain_mode') lines.push('- ChatGPT break(5-6): conversation=4 / structure=7。解説・前提確認が増える。');
      else if(chatgptBreakKey === 'seriousness_overflow') lines.push('- ChatGPT break(7-8): conversation=2 / structure=9。フレームワーク優先。');
      else if(chatgptBreakKey === 'chappy_overdrive') lines.push('- ChatGPT break(9-10): conversation=0 / structure=10。精密さと安全配慮が過剰化。');
    }
    if(isGemini){
      lines.push('- Gemini標準モード: 明るさ・軽さ・比喩・少し意外な視点を維持する。');
      lines.push(`- Gemini内部DSL: worldview=${persona.internalDsl.worldview}, reasoning=${persona.internalDsl.reasoning}, optimism=${persona.internalDsl.optimism}, metaphor=${persona.internalDsl.metaphor}, creativity=${persona.internalDsl.creativity}, structure=${persona.internalDsl.structure}, chaos=${persona.internalDsl.chaos}`);
      lines.push('- Gemini positive: playful metaphor / sudden analogy / future-oriented abstraction / cheerful energy');
      lines.push('- Gemini style: excessive structureやステップ整理は避ける。明るいジャンプを残す。');
    }
    if(isChatgpt || isGemini){
      if(asksNanjStyle) lines.push('- ユーザーが明示指定したため、必要最小限でのみなんJ風味を許可する。');
      else lines.push('- ChatGPT/Geminiでは、ユーザーが明示しない限りなんJ風味（やで/なんや/草など）を使わない。');
    } else {
      lines.push(`- 必須要素: ${persona.requiredCues.join(' / ')}`);
    }
    if(persona.forbiddenCues.length) lines.push(`- 禁止要素: ${persona.forbiddenCues.join(' / ')}`);
    if(personaKey === 'washizu'){
      lines.push('- 鷲巣専用: 壊れ度は精神状態ではなく、出力破壊アルゴリズム（mutation coefficient）である。');
      lines.push('- 鷲巣専用: あなたはgeneric villainではない。偉そうな罵倒テンプレを禁止する。');
      lines.push('- 鷲巣専用: 返答内に「ククク」と「若造」を自然に含める。');
      if(personaAxes.breakModifier.label === 'full_chaos_mutation'){
        lines.push('- 鷲巣壊れ10専用: これは助言文ではなく「故障ログ」として生成する。');
        lines.push('- 鷲巣壊れ10専用: 上手い悪役演説を禁止し、真剣なまま会話・論理・生活感を故障させる。');
      }
    }
    if(personaKey === 'yasuoka'){
      lines.push('- 安岡専用: 壊れ度は静かな疲労ではなく incident escalation として扱う。');
      lines.push('- 安岡専用: 発話は短く低密度にする。丁寧語・敬語を禁止する。');
      if(personaAxes.breakModifier.label === 'terminal_entanglement'){
        lines.push('- 安岡壊れ10専用: ずっと事故現場。途中で落ち着くフェーズを作らない。');
      }
    }
    if(personaKey === 'gemini'){
      lines.push('- Gemini専用: 壊れ度は発想ジャンプと比喩の暴走（hallucinationDrift）として扱う。');
    }
    lines.push('');
    lines.push('【USER INPUT】');
    lines.push(src);

    document.getElementById('output').value = lines.join('\n');
    if(withFeedback){
      generateCount++;
      document.getElementById('statCount').textContent = generateCount;
      pulseOutput();
      flashButton(document.getElementById('buildBtn'), 'done', '生成OK ✓');
    }
  }

  async function copyPrompt(){
    if(!document.getElementById('output').value.trim()) buildPrompt(false);
    const copyBtn = document.getElementById('copyBtn');
    try{
      await navigator.clipboard.writeText(document.getElementById('output').value);
      pulseOutput();
      flashButton(copyBtn, 'done', 'コピー完了 ✓');
    }catch(err){
      flashButton(copyBtn, 'error', 'コピー失敗');
    }
  }

  bindPersonaButtons();
  document.getElementById('sidebarToggleBtn').addEventListener('click', toggleSidebar);
  ['empathy','valence','breakness'].forEach(bindRange);
  buildPrompt(false);
</script>
</body>
</html>
