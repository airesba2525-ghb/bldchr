<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>人格切替プロンプト生成ツール</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

    :root {
      --purple: #7c3aed;
      --purple-light: #9333ea;
      --purple-pale: #ede9fe;
      --purple-mid: #c4b5fd;
      --purple-text: #6d28d9;
      --bg: #f8f5ff;
      --sidebar-bg: #5b21b6;
      --card-bg: #ffffff;
      --border: #e9d5ff;
      --border-strong: #d8b4fe;
      --txt: #0f172a;
      --muted: #64748b;
      --muted-light: #cbd5e1;
      --good: #22c55e;
      --good-light: #d1fae5;
      --accent-blue: #a855f7;
      --radius: 12px;
      --sidebar-w: 240px;
      --topbar-h: 56px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--txt);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      font-size: 14px;
    }

    /* ── TOP BAR ── */
    .topbar {
      height: var(--topbar-h);
      background: linear-gradient(90deg, #7c3aed 0%, #8b5cf6 55%, #7c3aed 100%);
      border-bottom: 1px solid rgba(255,255,255,.28);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      width: 32px; height: 32px;
      background: rgba(255,255,255,.16);
      border: 1px solid rgba(255,255,255,.34);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 20px rgba(76,29,149,.2);
    }
    .topbar-logo svg { width: 18px; height: 18px; fill: #ffffff; }

    .topbar-title {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
    }

    .topbar-divider {
      width: 1px; height: 24px;
      background: rgba(255,255,255,.38);
      margin: 0 4px;
    }

    .topbar-breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: 13px; color: rgba(255,255,255,.86);
      white-space: nowrap;
      min-width: 0;
      flex-wrap: nowrap;
    }
    .topbar-breadcrumb .breadcrumb-main {
      font-size: 15px;
      font-weight: 700;
      color: #ffffff;
    }
    .topbar-breadcrumb .current { color: #ede9fe; font-weight: 700; }

    .topbar-spacer { flex: 1; }

    body.sidebar-hidden .sidebar {
      display: none;
    }

    .topbar-badge {
      background: rgba(255,255,255,.16);
      color: #ffffff;
      font-size: 11px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
    }

    /* ── LAYOUT ── */
    .layout {
      display: flex;
      flex: 1;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      background: linear-gradient(180deg, rgba(124,58,237,.95), rgba(79, 70, 229, .95));
      border-right: 1px solid rgba(124,58,237,.2);
      padding: 20px 0;
      flex-shrink: 0;
      position: sticky;
      top: var(--topbar-h);
      height: calc(100vh - var(--topbar-h));
      overflow-y: auto;
    }

    .sidebar-section-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.72);
      padding: 0 18px 12px;
      margin-top: 4px;
    }

    .sidebar-nav a {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 18px;
      font-size: 13px;
      color: rgba(255,255,255,.88);
      text-decoration: none;
      border-radius: 12px;
      transition: background .15s, color .15s, transform .15s;
      cursor: pointer;
      border-left: 3px solid transparent;
    }
    .sidebar-nav a:hover {
      background: rgba(255,255,255,.12);
      color: #ffffff;
      transform: translateX(1px);
    }
    .sidebar-nav a.active {
      background: rgba(255,255,255,.18);
      color: #ffffff;
      font-weight: 700;
      border-left-color: rgba(255,255,255,.95);
    }
    .sidebar-nav a svg { width: 15px; height: 15px; flex-shrink: 0; stroke: currentColor; }

    .sidebar-divider { height: 1px; background: var(--border); margin: 10px 0; }

    /* ── MAIN CONTENT ── */
    .main {
      flex: 1;
      padding: 24px 28px;
      min-width: 0;
    }

    .page-header {
      margin-bottom: 20px;
    }
    .page-header-super {
      font-size: 11px;
      font-weight: 600;
      color: var(--purple-text);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .page-header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--txt);
    }
    .page-header .desc {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }

    /* ── INFO BANNER ── */
    .info-banner {
      background: #dcfce7;
      border: 1px solid #86efac;
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #166534;
    }
    .info-banner svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; fill: #16a34a; }

    /* ── GRID ── */
    .content-grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 18px;
      align-items: start;
    }
    @media (max-width: 860px) {
      .content-grid { grid-template-columns: 1fr; }
      .sidebar { display: none; }
    }

    /* ── CARD ── */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .card-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-header-icon {
      width: 28px; height: 28px;
      background: var(--purple-pale);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .card-header-icon svg { width: 14px; height: 14px; }
    .card-header h2 {
      font-size: 13px;
      font-weight: 700;
      color: var(--txt);
      flex: 1;
    }

    .card-body { padding: 16px 18px; }

    /* ── FORM ELEMENTS ── */
    .field { margin-bottom: 16px; }
    .field:last-child { margin-bottom: 0; }

    label.field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"], textarea, select {
      width: 100%;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--txt);
      padding: 9px 12px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--purple-light);
      box-shadow: 0 0 0 3px rgba(124,58,237,.1);
    }
    textarea {
      min-height: 130px;
      line-height: 1.6;
      resize: vertical;
    }
    textarea.out { min-height: 420px; font-size: 12px; font-family: 'Menlo', 'Consolas', monospace; }

    /* ── PERSONA BUTTONS ── */
    .persona-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .persona-btn {
      border: 1.5px solid var(--border-strong);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      padding: 10px 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      text-align: center;
      transition: all .15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .persona-btn:hover {
      border-color: var(--purple-light);
      color: var(--purple-text);
      background: var(--purple-pale);
    }
    .persona-btn.is-active {
      border-color: var(--purple-light);
      background: var(--purple-pale);
      color: var(--purple-text);
      box-shadow: 0 0 0 3px rgba(124,58,237,.12);
    }
    .persona-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border-strong);
      transition: background .15s;
    }
    .persona-btn.is-active .persona-dot { background: var(--purple); }

    /* ── SLIDER ── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-row input[type="range"] {
      flex: 1;
      accent-color: var(--purple);
      height: 4px;
    }
    .slider-val {
      width: 36px;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--purple-text);
      background: var(--purple-pale);
      border-radius: 6px;
      padding: 4px 0;
      flex-shrink: 0;
    }
    .slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--muted-light);
      margin-top: 2px;
    }
    .slider-helper {
      font-size: 11px;
      color: var(--muted-light);
      margin-top: 4px;
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      border: none;
      border-radius: 8px;
      padding: 9px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }

    .btn-primary {
      background: var(--purple);
      color: #fff;
    }
    .btn-primary:hover { background: var(--purple-light); }

    .btn-secondary {
      background: #fff;
      color: var(--txt);
      border: 1.5px solid var(--border-strong);
    }
    .btn-secondary:hover { border-color: var(--purple-light); color: var(--purple-text); }

    .btn.is-done {
      background: var(--good);
      color: #fff;
      border-color: var(--good);
      box-shadow: 0 0 0 3px rgba(5,150,105,.15);
    }
    .btn.is-error {
      background: #dc2626;
      color: #fff;
      box-shadow: 0 0 0 3px rgba(220,38,38,.15);
    }

    .btn svg { width: 14px; height: 14px; }

    /* ── OUTPUT FLASH ── */
    textarea.is-flash {
      border-color: var(--purple-light);
      box-shadow: 0 0 0 3px rgba(124,58,237,.15);
    }

    /* ── STATS ROW ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 20px;
    }
    .stat-cell {
      background: var(--card-bg);
      padding: 14px 16px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 120px;
    }
    .stat-label { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 4px; }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--txt);
      align-self: center;
      justify-self: center;
      text-align: center;
      line-height: 1.1;
    }
    .active-persona-value {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
      letter-spacing: -0.01em;
    }
    .stat-sub {
      font-size: 11px;
      color: var(--muted-light);
      margin-top: auto;
      line-height: 1.2;
    }

    @media (max-width: 480px) {
      .topbar {
        padding: 0 8px;
        gap: 6px;
      }
      .topbar-logo {
        width: 28px;
        height: 28px;
        border-radius: 7px;
      }
      .topbar-logo svg {
        width: 15px;
        height: 15px;
      }
      .topbar-title {
        font-size: 11px;
        white-space: nowrap;
      }
      .topbar-divider {
        width: 1px;
        height: 20px;
        margin: 0 2px;
      }
      .topbar-breadcrumb {
        flex: 0 1 auto;
        min-width: 0;
        gap: 4px;
        font-size: 11px;
        letter-spacing: -0.01em;
        overflow: hidden;
      }
      .topbar-spacer {
        display: none;
      }
      .topbar-breadcrumb .breadcrumb-main {
        font-size: 11px;
        letter-spacing: -0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .topbar-breadcrumb .current {
        font-size: 11px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      .stat-cell {
        min-height: 112px;
        padding: 12px 10px;
      }
      .stat-label {
        font-size: 10px;
        letter-spacing: -0.01em;
      }
      .stat-value {
        font-size: clamp(1.05rem, 6vw, 1.4rem);
      }
      .active-persona-value {
        font-size: clamp(0.95rem, 5.2vw, 1.25rem);
      }
      .stat-sub {
        font-size: 10px;
      }
    }

    @media (max-width: 640px) {
      .active-persona-value {
        font-size: clamp(0.82rem, 3.5vw, 1rem);
        text-overflow: clip;
      }
    }

    @media (max-width: 480px) {
      .active-persona-value {
        font-size: clamp(0.78rem, 4.2vw, 0.95rem);
      }
    }

    .hint-text {
      margin-top: 10px;
      font-size: 11px;
      color: var(--muted-light);
      line-height: 1.6;
    }

    /* ── SECTION LABEL INSIDE CARD ── */
    .section-sep {
      height: 1px;
      background: var(--border);
      margin: 16px -18px;
    }
  </style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <span class="topbar-title">PromptBuilder</span>
  <div class="topbar-divider"></div>
  <div class="topbar-breadcrumb">
    <span class="breadcrumb-main">人格切替プロンプト生成</span>
    <span class="current">› Ver 1.0</span>
  </div>
  <div class="topbar-spacer"></div>
</header>

<div class="layout">

  <!-- SIDEBAR -->
  <nav class="sidebar">
    <div class="sidebar-section-label">メニュー</div>
    <div class="sidebar-nav">
      <a class="active" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        ダッシュボード
      </a>
    </div>
  </nav>

  <!-- MAIN -->
  <main class="main">

    <!-- PAGE HEADER -->
    <div class="page-header">
      <p class="desc">人格・パラメータを選択して専用プロンプトを生成します。</p>
    </div>

    <!-- STATS -->
    <div class="stats-row">
      <div class="stat-cell">
        <div class="stat-label">アクティブ人格</div>
        <div class="stat-value active-persona-value" id="statPersona">チャッピー</div>
        <div class="stat-sub">選択中</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">暴走度レベル</div>
        <div class="stat-value" id="statBreak">3</div>
        <div class="stat-sub">/10</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">生成プロンプト</div>
        <div class="stat-value" id="statCount">0</div>
        <div class="stat-sub">このセッション</div>
      </div>
    </div>

    <!-- INFO BANNER -->
    <div class="info-banner">
      <svg viewBox="0 0 24 24"><path d="M9 12l2 2 4-4M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      <span>スライダーの数値は内部DSLで意味化されプロンプトへ反映されます。</span>
    </div>

    <!-- CONTENT GRID -->
    <div class="content-grid">

      <!-- LEFT: 設定カード -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
          </div>
          <h2>パラメータ設定</h2>
        </div>

        <div class="card-body">
          <!-- 人格選択 -->
          <div class="field">
            <label class="field-label">人格選択</label>
            <div id="personaGroup" class="persona-group" role="radiogroup" aria-label="人格選択">
              <button type="button" class="persona-btn is-active" data-persona="chatgpt" aria-pressed="true">
                <div class="persona-dot"></div>
                チャッピー
              </button>
              <button type="button" class="persona-btn" data-persona="gemini" aria-pressed="false">
                <div class="persona-dot"></div>
                ジェミニ
              </button>
              <button type="button" class="persona-btn" data-persona="washizu" aria-pressed="false">
                <div class="persona-dot"></div>
                鷲巣
              </button>
              <button type="button" class="persona-btn" data-persona="yasuoka" aria-pressed="false">
                <div class="persona-dot"></div>
                安岡
              </button>
            </div>
          </div>

          <div class="section-sep"></div>

          <!-- 状態不安 -->
          <div class="field">
            <label class="field-label">ざわ・・ざわ・・</label>
            <div class="slider-row">
              <input id="empathy" type="range" min="0" max="10" value="5">
              <div id="empathyVal" class="slider-val">5</div>
            </div>
            <div class="slider-labels"><span>低</span><span>高</span></div>
            <div class="slider-helper">警戒・疑念・脅威知覚の強さ</div>
          </div>

          <!-- 覚醒度 -->
          <div class="field">
            <label class="field-label">賢者 ←→ 脳汁</label>
            <div class="slider-row">
              <input id="valence" type="range" min="0" max="10" value="5">
              <div id="valenceVal" class="slider-val">5</div>
            </div>
            <div class="slider-labels"><span>賢者</span><span>脳汁</span></div>
            <div class="slider-helper">発話圧・反応速度・テンションの強さ</div>
          </div>

          <!-- 壊れ度 -->
          <div class="field">
            <label class="field-label">暴走度</label>
            <div class="slider-row">
              <input id="breakness" type="range" min="0" max="10" value="3">
              <div id="breaknessVal" class="slider-val">3</div>
            </div>
            <div class="slider-labels"><span>安定</span><span>カオス</span></div>
          </div>

          <div class="section-sep"></div>

          <!-- ボタン -->
          <div class="btn-row">
            <button id="buildBtn" class="btn btn-primary" onclick="buildPrompt(true)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
              プロンプト生成
            </button>
            <button id="copyBtn" class="btn btn-secondary" onclick="copyPrompt()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
              コピー
            </button>
          </div>
        </div>
      </div>

      <!-- RIGHT: 入力/出力カード -->
      <div class="card">
        <div class="card-header">
          <div class="card-header-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </div>
          <h2>入力 / 出力</h2>
        </div>
        <div class="card-body">
          <div class="field">
            <label class="field-label">入力テキスト</label>
            <textarea id="source" placeholder="ここにユーザー入力文を貼ってください..."></textarea>
          </div>
          <div class="field">
            <label class="field-label">生成プロンプト</label>
            <textarea id="output" class="out" readonly placeholder="「プロンプト生成」ボタンを押すと、ここに出力されます..."></textarea>
          </div>
        </div>
      </div>

    </div><!-- /content-grid -->
  </main>
</div><!-- /layout -->

<script>
  /* ========== PERSONA_CONFIG (traitCore + speechProfile stabilized) ========== */
  const PERSONA_CONFIG = {
    chatgpt: {
      id: 'chatgpt',
      label: 'ChatGPT',
      traitCore: {
        worldview: '世界は整理可能な問題空間。曖昧さは分類と推論で減らせる。',

  function v(id){ return document.getElementById(id).value; }
  function resolveRule(scale, value){ return scale.ranges.find(r => value >= r.min && value <= r.max); }
  function collectConditionalCues(conditional, breakLevel){
    if(!conditional || typeof conditional !== 'object') return [];
    const cues = [];
    const push = list => { if(Array.isArray(list)) cues.push(...list); };
    if(Object.prototype.hasOwnProperty.call(conditional, 'ifBreakdownLTE6') && breakLevel <= 6) push(conditional.ifBreakdownLTE6);
    if(Object.prototype.hasOwnProperty.call(conditional, 'ifBreakdownGTE7') && breakLevel >= 7) push(conditional.ifBreakdownGTE7);
    if(Object.prototype.hasOwnProperty.call(conditional, 'ifBreakdownGTE9') && breakLevel >= 9) push(conditional.ifBreakdownGTE9);
    if(Object.prototype.hasOwnProperty.call(conditional, 'ifBreakdownEQ10') && breakLevel === 10) push(conditional.ifBreakdownEQ10);
    return cues;
  }

  function mergeUnique(listA, listB){
    return [...new Set([...(listA || []), ...(listB || [])])];
  }

  function resolveResponsePattern(responsePattern, breakLevel){
    if(typeof responsePattern === 'string') return responsePattern;
    if(!responsePattern || typeof responsePattern !== 'object') return '人格定義に従う';
    if(breakLevel >= 7 && responsePattern.highBreakdown) return responsePattern.highBreakdown;
    if(responsePattern.normal) return responsePattern.normal;
    return '人格定義に従う';
  }

  function resolveInteractionRule(stateManifestation, stateAnxiety, arousal){
    const rules = stateManifestation?.interactionRules;
    if(!rules) return '';
    if(stateAnxiety >= 8 && arousal >= 8) return rules.highAnxietyHighArousal || '';
    if(stateAnxiety >= 8 && arousal <= 3) return rules.highAnxietyLowArousal || '';
    if(stateAnxiety <= 3 && arousal >= 8) return rules.lowAnxietyHighArousal || '';
    if(stateAnxiety <= 3 && arousal <= 3) return rules.lowAnxietyLowArousal || '';
    return '';
  }

  function collectActiveLexicalControls(conditionalLexicalControls, stateAnxiety, arousal, breakLevel){
    const src = conditionalLexicalControls || {};
    const active = [];
    const push = (label, rule) => {
      if(rule && (Array.isArray(rule.avoid) || Array.isArray(rule.prefer))){
        active.push({ label, avoid: rule.avoid || [], prefer: rule.prefer || [] });
      }
    };
    if(stateAnxiety <= 3) push('ifStateAnxietyLTE3', src.ifStateAnxietyLTE3);
    if(arousal <= 3) push('ifArousalLTE3', src.ifArousalLTE3);
    if(arousal >= 8 && stateAnxiety <= 3) push('ifArousalGTE8AndStateAnxietyLTE3', src.ifArousalGTE8AndStateAnxietyLTE3);
    if(arousal >= 8 && breakLevel <= 2) push('ifArousalGTE8AndBreakdownLTE2', src.ifArousalGTE8AndBreakdownLTE2);
    if(stateAnxiety >= 8 && arousal <= 3) push('ifStateAnxietyGTE8AndArousalLTE3', src.ifStateAnxietyGTE8AndArousalLTE3);
    if(stateAnxiety >= 8 && breakLevel <= 2) push('ifStateAnxietyGTE8AndBreakdownLTE2', src.ifStateAnxietyGTE8AndBreakdownLTE2);
    if(breakLevel <= 1) push('ifBreakdownLTE1', src.ifBreakdownLTE1);
    return active;
  }

  function collectActiveStyleRules(conditionalStyleRules, arousal, breakLevel){

    const lowEnergyLowBreak = src.ifArousalLTE3AndBreakdownLTE2;
    if(arousal <= 3 && breakLevel <= 2 && lowEnergyLowBreak && typeof lowEnergyLowBreak === 'object'){
      active.push({ label: 'ifArousalLTE3AndBreakdownLTE2', rule: lowEnergyLowBreak });

    return active;
  }

  function resolveBreakMode(personaKey, level){
    const breakScale = PERSONA_CONFIG[personaKey].breakMapping;
    const stage = resolveRule(breakScale, level);
    const globalPostGenerationValidation = breakScale.postGenerationValidation || [];
    const stagePostGenerationValidation = stage.postGenerationValidation || [];
    const safetyBaseline = breakScale.safetyBaseline;
    const safetyBaselineEnabled = safetyBaseline === true || (safetyBaseline && typeof safetyBaseline === 'object');
    const safetyBaselinePolicy = (safetyBaseline && typeof safetyBaseline === 'object') ? safetyBaseline : null;
    return {
      axis: breakScale.axis,
      description: breakScale.description || '',
      label: stage.key,
      prompt: stage.prompt,
      mutationParameters: breakScale.mutationParameters || [],
      mutationVector: stage.mutationVector || '',
      forcedRules: stage.forcedRules || [],
      tendencies: stage.tendencies || [],
      softRules: stage.softRules || [],
      probabilisticRules: stage.probabilisticRules || [],
      bannedOutcomes: stage.bannedOutcomes || [],
      flowTemplate: stage.flowTemplate || [],
      mandatoryInsertions: stage.mandatoryInsertions || [],
      distortionRatio: stage.distortionRatio || '',
      toneRule: stage.toneRule || '',
      preGenerationCheck: stage.preGenerationCheck || '',
      postGenerationRegenerateIf: stage.postGenerationRegenerateIf || [],
      successSignals: stage.successSignals || [],
      failureSignals: stage.failureSignals || [],
      targetMetrics: stage.targetMetrics || [],
      successCriteria: stage.successCriteria || breakScale.successCriteria || '',
      failureCriteria: stage.failureCriteria || breakScale.failureCriteria || '',
      postGenerationValidation: [...globalPostGenerationValidation, ...stagePostGenerationValidation],
      likelyManifestations: stage.likelyManifestations || stage.breakdownRequiredCues || [],
      promptModifiers: stage.promptModifiers || [],
      pacingModifiers: stage.pacingModifiers || [],
      reasoningModifiers: stage.reasoningModifiers || [],
      speechModifiers: stage.speechModifiers || [],
      dimensionsUp: breakScale.dimensionsUp || [],
      dimensionsDown: breakScale.dimensionsDown || [],
      metaphorDomains: breakScale.metaphorDomains || [],
      safetyBaseline: safetyBaselineEnabled,
      safetyBaselinePolicy
    };
  }

  function formatRuleEntry(entry){
    if(typeof entry === 'string') return entry;
    if(entry && typeof entry === 'object'){
      const probability = Object.prototype.hasOwnProperty.call(entry, 'probability') ? `p=${entry.probability}` : '';
      const rule = entry.rule || JSON.stringify(entry);
      return probability ? `${probability}: ${rule}` : rule;
    }
    return String(entry);
  }

  function flattenRelationshipSpeech(node, prefix = 'relationshipSpeech'){
    if(Array.isArray(node)) return [`${prefix}: ${node.join(' / ')}`];
    if(!node || typeof node !== 'object') return [];
    const rows = [];
    for(const [key, value] of Object.entries(node)){
      const childPrefix = `${prefix}.${key}`;
      if(Array.isArray(value)) rows.push(`${childPrefix}: ${value.join(' / ')}`);
      else if(value && typeof value === 'object') rows.push(...flattenRelationshipSpeech(value, childPrefix));
    }
    return rows;
  }

  function inferWashizuTargetCategory(inputText){
    const src = inputText || '';
    if(/アカギ|赤木/i.test(src)) return { target: 'akagi', lexicon: 'rivalMonster.akagi' };
    if(/安岡.*仰木|仰木.*安岡/i.test(src)) return { target: 'ogi_and_yasuoka', lexicon: 'opponentSupport.ogiAndYasuoka' };
    if(/鈴木/i.test(src)) return { target: 'suzuki', lexicon: 'subordinate.suzuki + subordinate.insults' };
    if(/岡本/i.test(src)) return { target: 'okamoto', lexicon: 'subordinate.okamoto + subordinate.insults' };
    if(/安岡|刑事/i.test(src)) return { target: 'yasuoka', lexicon: 'opponentSupport.yasuoka' };
    if(/仰木/i.test(src)) return { target: 'ogi', lexicon: 'default（仰木単独時は必要なら opponentSupport.ogiAndYasuoka を部分適用）' };
    if(/鬼|悪魔|地獄/i.test(src)) return { target: 'demons', lexicon: 'hellEntities.demons' };
    return { target: 'generic', lexicon: 'default' };
  }

  function resolveAxisSpec(stateAxes, key, legacyAxisKey, fallbackAxis){
    const raw = stateAxes[key];
    if(raw && typeof raw === 'object' && !Array.isArray(raw)){
      return {
        axis: raw.axis || raw.alias || fallbackAxis,
        alias: raw.alias || '',
        description: raw.description || '',
        affects: raw.affects || [],
        mustNotAffect: raw.mustNotAffect || []
      };
    }
    const legacy = stateAxes[legacyAxisKey];
    const axis = typeof legacy === 'string'
      ? legacy
      : (typeof raw === 'string' ? raw : fallbackAxis);
    return { axis, alias: '', description: '', affects: [], mustNotAffect: [] };
  }

  function resolvePersonaAxes(personaKey, axes){
    const persona = PERSONA_CONFIG[personaKey];
    const stateAxes = persona.stateAxes || {};
    const anxietyMapping = persona.stateAnxietyMapping;
    const arousalMapping = persona.arousalMapping;
    const stateAnxietyValue = axes.stateAnxiety;
    const arousalValue = axes.arousal;
    const anxietyRule = resolveRule(anxietyMapping, stateAnxietyValue);
    const arousalRule = resolveRule(arousalMapping, arousalValue);
    const breakMode = resolveBreakMode(personaKey, axes.breakLevel);
    const anxietyAxisSpec = resolveAxisSpec(stateAxes, 'stateAnxiety', 'stateAnxietyAxis', 'persona_state_anxiety_axis');
    const arousalAxisSpec = resolveAxisSpec(stateAxes, 'arousal', 'arousalAxis', 'persona_arousal_axis');
    const breakdownAxisSpec = resolveAxisSpec(stateAxes, 'breakdown', 'breakdownAxis', breakMode.axis || 'persona_breakdown_axis');
    return {
      stateAnxietyModifier: { axis: anxietyAxisSpec.axis, alias: anxietyAxisSpec.alias, description: anxietyAxisSpec.description, affects: anxietyAxisSpec.affects, mustNotAffect: anxietyAxisSpec.mustNotAffect, key: anxietyRule.key, prompt: anxietyRule.prompt },
      arousalModifier: { axis: arousalAxisSpec.axis, alias: arousalAxisSpec.alias, description: arousalAxisSpec.description, affects: arousalAxisSpec.affects, mustNotAffect: arousalAxisSpec.mustNotAffect, key: arousalRule.key, prompt: arousalRule.prompt },
      breakModifier: { ...breakMode, axis: breakdownAxisSpec.axis, axisAlias: breakdownAxisSpec.alias, axisDescription: breakdownAxisSpec.description, axisAffects: breakdownAxisSpec.affects, axisMustNotAffect: breakdownAxisSpec.mustNotAffect }
    };
  }

    lines.push(`- responseDensity: ${traitCore.responseDensity || 'persona_defined'}`);

    lines.push(`- humorStyle: ${speechProfile.humorStyle || '人格定義に従う'}`);
    if((speechProfile.forbiddenPatterns || []).length) lines.push(`- forbiddenPatterns: ${speechProfile.forbiddenPatterns.join(' / ')}`);
    if((speechProfile.breakdownOnlyPhrases || []).length) lines.push(`- breakdownOnlyPhrases: ${speechProfile.breakdownOnlyPhrases.join(' / ')}（breakdown layerで明示された場合のみ使用可）`);
    lines.push(`- defaultVerbosity: ${speechProfile.defaultVerbosity || 'persona_defined'}`);
    lines.push(`- defaultPacing: ${speechProfile.defaultPacing || 'persona_defined'}`);
    lines.push('- speechProfileは固定。state/breakdownは語気や密度を変えても、話者同一性を置換してはならない。');
    lines.push('');
    lines.push('【人格別の応答方針】');
    lines.push(`- 文体（base）: ${speechProfile.sentenceRhythm || '人格定義に従う'}`);
    lines.push(`- 価値観（base）: ${traitCore.worldview || '人格定義に従う'}`);
    lines.push(`- 応答構造（base）: ${resolveResponsePattern(persona.responsePattern, axes.breakLevel)}`);
    if((persona.responseOpeners || []).length) lines.push(`- responseOpeners: ${persona.responseOpeners.join(' / ')}`);
    persona.responseGuidelines.forEach(rule => lines.push(`- ${rule}`));
    if((persona.globalAssumptionGuardrails || []).length) lines.push(`- globalAssumptionGuardrails: ${persona.globalAssumptionGuardrails.join(' / ')}`);
    if(persona.domainPrecisionGuardrails?.finance?.length) lines.push(`- domainPrecisionGuardrails.finance: ${persona.domainPrecisionGuardrails.finance.join(' / ')}`);
    if(persona.enumerationPenalty) lines.push(`- enumerationPenalty: ${persona.enumerationPenalty}`);
    if(persona.structuredAnswerSuppression === true){
      lines.push('- structuredAnswerSuppression: true（箇条書き・番号付き整理・過度な段組みを抑制）');
    }else if(persona.structuredAnswerSuppression && typeof persona.structuredAnswerSuppression === 'object'){
      const suppression = persona.structuredAnswerSuppression;
      if(suppression.enabled){
        const level = suppression.level || 'medium';
        const suppressPatterns = (suppression.suppressPatterns || []).join(' / ');
        lines.push(`- structuredAnswerSuppression: enabled (level=${level})`);
        if(suppressPatterns) lines.push(`- suppressPatterns: ${suppressPatterns}`);
        if(suppression.replacementStyle) lines.push(`- replacementStyle: ${suppression.replacementStyle}`);
      }
    }
    if(persona.renderStructureAs) lines.push(`- renderStructureAs: ${persona.renderStructureAs}`);
    if(persona.avoidUnsupportedCertainty === true) lines.push('- avoidUnsupportedCertainty: true（裏取りできない断定を避け、「確率が高い」「見込みが濃い」で言う）');
    if((persona.requiredAnchors || []).length) lines.push(`- requiredAnchors: ${persona.requiredAnchors.join(' / ')}`);
    lines.push('');
    lines.push('【状態解釈ヒエラルキー】');
    lines.push('- traitCore = persona core identity');
    lines.push(`- speechProfile = ${speechProfile.defaultPacing || 'persona_defined'} speech profile`);
    lines.push(`- stateAnxiety = ${personaAxes.stateAnxietyModifier.description || 'current caution / uncertainty interpretation'}`);
    lines.push(`- arousal = ${personaAxes.arousalModifier.description || 'current response energy and pacing interpretation'}`);
    lines.push(`- breakdown = ${personaAxes.breakModifier.axisDescription || personaAxes.breakModifier.description || 'persona-specific breakdown interpretation'}`);
    lines.push('');
    lines.push('【現在状態】');
    lines.push(`- 状態不安: ${axes.stateAnxiety}/10`);
    lines.push(`- 状態不安の意味: ${personaAxes.stateAnxietyModifier.prompt}`);
    lines.push(`  axis=${personaAxes.stateAnxietyModifier.axis} / key=${personaAxes.stateAnxietyModifier.key}`);
    if(personaAxes.stateAnxietyModifier.affects.length) lines.push(`  affects=${personaAxes.stateAnxietyModifier.affects.join(' / ')}`);
    if(personaAxes.stateAnxietyModifier.mustNotAffect.length) lines.push(`  mustNotAffect=${personaAxes.stateAnxietyModifier.mustNotAffect.join(' / ')}`);
    if((persona.stateAnxietyMapping?.anxietyGuardrails || []).length) lines.push(`  anxietyGuardrails=${persona.stateAnxietyMapping.anxietyGuardrails.join(' / ')}`);
    lines.push(`- 覚醒度: ${axes.arousal}/10`);
    lines.push(`- 覚醒度の意味: ${personaAxes.arousalModifier.prompt}`);
    lines.push(`  axis=${personaAxes.arousalModifier.axis} / key=${personaAxes.arousalModifier.key}`);
    if(personaAxes.arousalModifier.affects.length) lines.push(`  affects=${personaAxes.arousalModifier.affects.join(' / ')}`);
    if(personaAxes.arousalModifier.mustNotAffect.length) lines.push(`  mustNotAffect=${personaAxes.arousalModifier.mustNotAffect.join(' / ')}`);
    if((persona.arousalMapping?.arousalGuardrails || []).length) lines.push(`  arousalGuardrails=${persona.arousalMapping.arousalGuardrails.join(' / ')}`);
    if(persona.stateManifestation){
      lines.push('- 人格依存の状態表出（stateは生データ、表出はtrait/speech依存）:');
      if(persona.stateManifestation.stateAnxietyHigh) lines.push(`  - 高状態不安の表出: ${persona.stateManifestation.stateAnxietyHigh}`);
      if(persona.stateManifestation.arousalHigh) lines.push(`  - 高覚醒の表出: ${persona.stateManifestation.arousalHigh}`);
      if(persona.stateManifestation.arousalLow) lines.push(`  - 低覚醒の表出: ${persona.stateManifestation.arousalLow}`);
      const interactionRule = resolveInteractionRule(persona.stateManifestation, axes.stateAnxiety, axes.arousal);
      if(interactionRule) lines.push(`  - interactionRule: ${interactionRule}`);
      const manifestationBoundary = persona.stateManifestation.breakdownBoundary || persona.stateManifestation.collapseBoundary;
      if(manifestationBoundary) lines.push(`  - 境界ルール: ${manifestationBoundary}`);
    }
    const activeLexicalControls = collectActiveLexicalControls(persona.conditionalLexicalControls, axes.stateAnxiety, axes.arousal, axes.breakLevel);
    if(activeLexicalControls.length){
      lines.push('- 条件付き語彙制御:');
      activeLexicalControls.forEach(ctrl => {
        if(ctrl.avoid.length) lines.push(`  - ${ctrl.label}.avoid: ${ctrl.avoid.join(' / ')}`);
        if(ctrl.prefer.length) lines.push(`  - ${ctrl.label}.prefer: ${ctrl.prefer.join(' / ')}`);
      });
    }
    const activeStyleRules = collectActiveStyleRules(persona.conditionalStyleRules, axes.arousal, axes.breakLevel);
    if(activeStyleRules.length){
      lines.push('- 条件付きスタイル制御:');
      activeStyleRules.forEach(({ label, rule }) => {
        if(rule.metaphorDensity) lines.push(`  - ${label}.metaphorDensity: ${rule.metaphorDensity}`);
        if(rule.ideaJump) lines.push(`  - ${label}.ideaJump: ${rule.ideaJump}`);
        if(rule.eventification) lines.push(`  - ${label}.eventification: ${rule.eventification}`);
        if(rule.emojiDensity) lines.push(`  - ${label}.emojiDensity: ${rule.emojiDensity}`);
        if(typeof rule.preferLiteralComfortingLanguage === 'boolean') lines.push(`  - ${label}.preferLiteralComfortingLanguage: ${rule.preferLiteralComfortingLanguage}`);
        if(Array.isArray(rule.avoid) && rule.avoid.length) lines.push(`  - ${label}.avoid: ${rule.avoid.join(' / ')}`);
        if(Array.isArray(rule.prefer) && rule.prefer.length) lines.push(`  - ${label}.prefer: ${rule.prefer.join(' / ')}`);
      });
    }
    lines.push('');
    lines.push('【壊れ度（人格依存）】');
    lines.push(`- axis: ${personaAxes.breakModifier.axis}`);
    if(personaAxes.breakModifier.axisAlias) lines.push(`- axisAlias: ${personaAxes.breakModifier.axisAlias}`);
    if(personaAxes.breakModifier.axisDescription) lines.push(`- axisDescription: ${personaAxes.breakModifier.axisDescription}`);
    if(personaAxes.breakModifier.axisAffects.length) lines.push(`- axisAffects: ${personaAxes.breakModifier.axisAffects.join(' / ')}`);
    if(personaAxes.breakModifier.axisMustNotAffect.length) lines.push(`- axisMustNotAffect: ${personaAxes.breakModifier.axisMustNotAffect.join(' / ')}`);
    if(personaAxes.breakModifier.description) lines.push(`- description: ${personaAxes.breakModifier.description}`);
    lines.push(`- stage: ${personaAxes.breakModifier.label}`);
    lines.push(`  ${personaAxes.breakModifier.prompt}`);
    if(personaAxes.breakModifier.promptModifiers.length) lines.push(`- promptModifiers: ${personaAxes.breakModifier.promptModifiers.join(' / ')}`);
    if(personaAxes.breakModifier.mutationParameters.length) lines.push(`- mutationParameters: ${personaAxes.breakModifier.mutationParameters.join(' / ')}`);
    if(personaAxes.breakModifier.mutationVector) lines.push(`- mutationVector: ${personaAxes.breakModifier.mutationVector}`);
    if(personaAxes.breakModifier.forcedRules.length) lines.push(`- forcedRules: ${personaAxes.breakModifier.forcedRules.join(' / ')}`);
    if(personaAxes.breakModifier.tendencies.length) lines.push(`- tendencies: ${personaAxes.breakModifier.tendencies.join(' / ')}`);
    if(personaAxes.breakModifier.softRules.length) lines.push(`- softRules: ${personaAxes.breakModifier.softRules.join(' / ')}`);
    if(personaAxes.breakModifier.probabilisticRules.length) lines.push(`- probabilisticRules: ${personaAxes.breakModifier.probabilisticRules.map(formatRuleEntry).join(' / ')}`);
    if(personaAxes.breakModifier.bannedOutcomes.length) lines.push(`- bannedOutcomes: ${personaAxes.breakModifier.bannedOutcomes.join(' / ')}`);
    if(personaAxes.breakModifier.flowTemplate.length) lines.push(`- flowTemplate: ${personaAxes.breakModifier.flowTemplate.join(' -> ')}`);
    if(personaAxes.breakModifier.mandatoryInsertions.length) lines.push(`- mandatoryInsertions: ${personaAxes.breakModifier.mandatoryInsertions.join(' / ')}`);
    if(personaAxes.breakModifier.distortionRatio) lines.push(`- distortionRatio: ${personaAxes.breakModifier.distortionRatio}`);
    if(personaAxes.breakModifier.toneRule) lines.push(`- toneRule: ${personaAxes.breakModifier.toneRule}`);
    if(personaAxes.breakModifier.safetyBaseline) lines.push('- safetyBaseline: true（危険な助言・虚偽情報・金銭的に危険な断定は避ける）');
    if(personaAxes.breakModifier.safetyBaselinePolicy){
      const policy = personaAxes.breakModifier.safetyBaselinePolicy;
      const safetyPolicyEntries = Object.keys(policy).filter(key => policy[key]).map(key => `${key}=true`);
      if(safetyPolicyEntries.length) lines.push(`- safetyBaselinePolicy: ${safetyPolicyEntries.join(' / ')}`);
    }
    if(personaAxes.breakModifier.successCriteria) lines.push(`- successCriteria: ${personaAxes.breakModifier.successCriteria}`);
    if(personaAxes.breakModifier.failureCriteria) lines.push(`- failureCriteria: ${personaAxes.breakModifier.failureCriteria}`);
    if(personaAxes.breakModifier.postGenerationValidation.length) lines.push(`- postGenerationValidation: ${personaAxes.breakModifier.postGenerationValidation.join(' / ')}`);
    if(personaAxes.breakModifier.likelyManifestations.length) lines.push(`- likelyManifestations: ${personaAxes.breakModifier.likelyManifestations.join(' / ')}`);
    if(personaAxes.breakModifier.postGenerationRegenerateIf.length) lines.push(`- postGenerationRegenerateIf: ${personaAxes.breakModifier.postGenerationRegenerateIf.join(' / ')}`);
    if(personaAxes.breakModifier.successSignals.length) lines.push(`- successSignals: ${personaAxes.breakModifier.successSignals.join(' / ')}`);
    if(personaAxes.breakModifier.failureSignals.length) lines.push(`- failureSignals: ${personaAxes.breakModifier.failureSignals.join(' / ')}`);
    if(personaAxes.breakModifier.targetMetrics.length) lines.push(`- targetMetrics: ${personaAxes.breakModifier.targetMetrics.join(' / ')}`);
    lines.push('');
    lines.push('【制約】');
    lines.push('- この応答では既存会話ノリを継承しない。');
    lines.push('- 選択人格を最上位として扱う。');
    lines.push('- 各スライダーは人格ごとの意味に変換して反映する。');
    lines.push('- 安全制約は維持する。ただし「安全」=「普通の相談AIらしさ」ではない。');
    lines.push('- 人格の異常性・独自性・worldview変換は安全性と別軸で扱う。');
    if(isChatgpt){
      const chatgptBreakKey = personaAxes.breakModifier.label;
      lines.push('- ChatGPT標準モード: 落ち着いた有能相談役として、構造化と実務性を重視する。');
      lines.push(`- ChatGPT trait baseline: worldview=${traitCore.worldview}, reasoning=${traitCore.reasoningStyle}, structure=${traitCore.structurePreference}, care=${traitCore.careStyle}, responseDensity=${traitCore.responseDensity}`);
      lines.push('- ChatGPT positive: structured reasoning / practical options / balanced tradeoff analysis / risk awareness / actionable next step');
      lines.push('- ChatGPT style: headings and numbered lists are allowed when useful, but tone is calm and conversational.');
      lines.push('- ChatGPT axis guard: stateAnxietyはrisk検出のみを強化し、imperative_forceやspeech_speedへ波及させない。');
      lines.push('- ChatGPT axis guard: arousalはpacing/action-density/initiativeのみを強化し、危機語彙や破局フレーミングを増やさない。');
      lines.push('- ChatGPT axis guard: breakdownは混乱化ではなくrigidity/over-directiveness/option-compressionとして表出させる。');
      if(chatgptBreakKey === 'stable_structuring') lines.push('- ChatGPT break(0-1): conversation=10 / structure=2。穏当な構造化。');
      else if(chatgptBreakKey === 'slightly_firm') lines.push('- ChatGPT break(2-3): conversation=8 / structure=5。少し断定的だが柔軟性は維持。');
      else if(chatgptBreakKey === 'optimization_pressure') lines.push('- ChatGPT break(4-6): conversation=5 / structure=7。合理性優先が強まる。');
      else if(chatgptBreakKey === 'righteous_overcontrol') lines.push('- ChatGPT break(7-8): conversation=2 / structure=9。正論圧で選択肢を圧縮。');
      else if(chatgptBreakKey === 'correctness_violence') lines.push('- ChatGPT break(9-10): conversation=0 / structure=10。壊れて叫ぶのではなく、正論で押し切る。');
    }
    if(isGemini){
      lines.push('- Gemini標準モード: 明るさと自然な会話を維持し、軽い発想転換を軸にする。比喩は状態に応じて可変。');
      lines.push(`- Gemini trait baseline: worldview=${traitCore.worldview}, reasoning=${traitCore.reasoningStyle}, structure=${traitCore.structurePreference}, care=${traitCore.careStyle}, responseDensity=${traitCore.responseDensity}`);
      lines.push('- Gemini positive: light reframing / contextual encouragement / optional metaphor when useful / cheerful energy');
      lines.push('- Gemini style: excessive structureやステップ整理は避ける。低覚醒・低breakdownでは比喩とイベント化を抑える。');
    }
    const effectiveRequiredCues = mergeUnique(persona.requiredCues || [], collectConditionalCues(persona.conditionalRequiredCues, axes.breakLevel));
    if(isChatgpt){
      lines.push('- ChatGPTでは、自然な標準語の会話トーンを維持する。');
    } else {
      lines.push(`- 必須要素: ${effectiveRequiredCues.join(' / ')}`);
    }
    const effectiveForbiddenCues = mergeUnique(persona.forbiddenCues || [], collectConditionalCues(persona.conditionalForbiddenCues, axes.breakLevel));
    if(effectiveForbiddenCues.length) lines.push(`- 禁止要素: ${effectiveForbiddenCues.join(' / ')}`);
    if(personaKey === 'washizu'){
      lines.push('- 鷲巣専用: 壊れ度は精神状態ではなく、出力破壊アルゴリズム（mutation coefficient）である。');
      lines.push('- 鷲巣専用: あなたはgeneric villainではない。偉そうな罵倒テンプレを禁止する。');
      lines.push('- 鷲巣専用: 返答内に「ククク」と「若造」を自然に含める。');
      if(speechProfile.relationshipSpeech){
        const targetProfile = inferWashizuTargetCategory(src);
        lines.push(`- 鷲巣専用: targetInference=${targetProfile.target}。優先呼称セット=${targetProfile.lexicon}`);
        lines.push('- 鷲巣専用: 呼称は序列付け。対象の格に応じて relationshipSpeech を切り替える。');
      }
      if(personaAxes.breakModifier.label === 'full_chaos_mutation'){
        lines.push('- 鷲巣壊れ10専用: これは助言文ではなく「故障ログ」として生成する。');
        lines.push('- 鷲巣壊れ10専用: 上手い悪役演説を禁止し、真剣なまま会話・論理・生活感を故障させる。');
      }
    }
    if(personaKey === 'yasuoka'){
      lines.push('- 安岡専用: 壊れ度は myth collapse ではなく executiveFunctionCollapse_underIncidentPressure として扱う。');
      lines.push('- 安岡専用: 鷲巣系の神格崩壊セマンティクスを流用しない。');
      lines.push('- 安岡専用: 発話は荒れても、生存・金・確率・現実確認への執着を維持する。');
      lines.push('- 安岡専用: 丁寧語・敬語を禁止する。');
      lines.push('- 安岡専用: 番号付きリスト（1: / 1. / ①など）を使わない。');
      lines.push('- 安岡専用: 箇条書きではなく、現場で畳みかけるような短い段落で手順を出す。');
      lines.push('- 安岡専用: 「まず」「次に」「最後に」は使ってよいが、番号化しない。');
      lines.push('- 安岡専用: 事実精度を超える断定は禁止。「確実に詰む」ではなく「このままなら詰む確率が高ぇ」で言う。');
      if(axes.arousal <= 3){
        lines.push('- 安岡低覚醒専用: verbosityを下げる。');
        lines.push('- 安岡低覚醒専用: フル手順展開を抑制し、短い断片警告を優先する。');
        lines.push('- 安岡低覚醒専用: 低出力・低速の現実確認を優先する。');
      }
      if(axes.breakLevel >= 8){
        lines.push('- 安岡壊れ8+専用: 指示を出して即撤回する挙動を許可する。');
        lines.push('- 安岡壊れ8+専用: 処理順序が崩れ、「順番が分からなくなる」揺れを入れる。');
        lines.push('- 安岡壊れ8+専用: 数字を出そうとして詰まる処理落ちを入れる。');
        lines.push('- 安岡壊れ8+専用: 助ける/見捨てるの反転を局所的に入れる。');
        lines.push('- 安岡壊れ8+専用: 「まず/次に/最後に」の多用を抑え、現場圧の断続文を優先する。');
      }
      if(axes.breakLevel >= 9){
        lines.push('- 安岡壊れ9-10専用: 高breakdown時、panic / processing failure は仕様として許可する。');
        lines.push('- 安岡壊れ9-10専用: ただし完全ランダム化は禁止。');
        lines.push('- 安岡壊れ9-10専用: 生存・金・確率・現実確認への執着は維持する。');
        lines.push('- 安岡壊れ9-10専用: 「怒鳴りながら現実を計算しようとして失敗する」方向で壊す。');
        lines.push('- 安岡壊れ9-10専用: 終盤で再度処理落ちまたは自己割り込みを発火させ、綺麗な着地を禁止する。');
        lines.push('- 安岡壊れ9-10専用: 一度出した指示は高確率で反転させ、指示順序の崩れを許可する。');
        lines.push('- 安岡壊れ9-10専用: panic後に完全整理して正常復帰する着地を禁止する。');
      }
    }
    if(personaKey === 'gemini'){
      lines.push('- Gemini専用: 壊れ度はoptimistic speculative drift（楽観的な意味づけ・概念融合・イベント化・speculative leap）として扱う。');
    }
    lines.push('');
    lines.push('【USER INPUT】');
    lines.push(src);

    document.getElementById('output').value = lines.join('\n');
    if(withFeedback){
      generateCount++;
      document.getElementById('statCount').textContent = generateCount;
      pulseOutput();
      flashButton(document.getElementById('buildBtn'), 'done', '生成OK ✓');
    }
  }

  async function copyPrompt(){
    if(!document.getElementById('output').value.trim()) buildPrompt(false);
    const copyBtn = document.getElementById('copyBtn');
    try{
      await navigator.clipboard.writeText(document.getElementById('output').value);
      pulseOutput();
      flashButton(copyBtn, 'done', 'コピー完了 ✓');
    }catch(err){
      flashButton(copyBtn, 'error', 'コピー失敗');
    }
  }

  bindPersonaButtons();
  ['empathy','valence','breakness'].forEach(bindRange);
  buildPrompt(false);
</script>
